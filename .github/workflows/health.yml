name: Repository Health

on:
  schedule:
    - cron: '0 8 * * 1'  # Run every Monday at 8 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  repo-stats:
    name: Repository Statistics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate repository statistics
        run: |
          echo "## Repository Health Report" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Code Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count lines of code
          echo "| Language | Files | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|-------|" >> $GITHUB_STEP_SUMMARY

          RUST_FILES=$(find backend -name "*.rs" | wc -l)
          RUST_LINES=$(find backend -name "*.rs" -exec cat {} \; | wc -l)
          echo "| Rust | $RUST_FILES | $RUST_LINES |" >> $GITHUB_STEP_SUMMARY

          TS_FILES=$(find frontend/src -name "*.ts" -o -name "*.tsx" | wc -l)
          TS_LINES=$(find frontend/src \( -name "*.ts" -o -name "*.tsx" \) -exec cat {} \; | wc -l)
          echo "| TypeScript | $TS_FILES | $TS_LINES |" >> $GITHUB_STEP_SUMMARY

          CSS_FILES=$(find frontend/src -name "*.css" | wc -l)
          CSS_LINES=$(find frontend/src -name "*.css" -exec cat {} \; | wc -l)
          echo "| CSS | $CSS_FILES | $CSS_LINES |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Git Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL_COMMITS=$(git rev-list --count HEAD)
          echo "- Total commits: $TOTAL_COMMITS" >> $GITHUB_STEP_SUMMARY

          CONTRIBUTORS=$(git log --format='%aN' | sort -u | wc -l)
          echo "- Contributors: $CONTRIBUTORS" >> $GITHUB_STEP_SUMMARY

          LAST_COMMIT=$(git log -1 --format='%ci')
          echo "- Last commit: $LAST_COMMIT" >> $GITHUB_STEP_SUMMARY

  check-dependencies:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Check Rust dependencies
      - uses: dtolnay/rust-toolchain@stable
      - name: Check outdated Rust dependencies
        run: |
          cargo install cargo-outdated --locked || true
          echo "### Outdated Rust Dependencies" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo outdated --depth 1 >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Unable to check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: backend

      # Check NPM dependencies
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Check outdated NPM dependencies
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Outdated NPM Dependencies" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm outdated >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: frontend

  check-todos:
    name: Check TODOs and FIXMEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find TODOs and FIXMEs
        run: |
          echo "### TODO/FIXME Comments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Backend (Rust)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -rn "TODO\|FIXME\|HACK\|XXX" backend/src --include="*.rs" | head -30 >> $GITHUB_STEP_SUMMARY || echo "None found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Frontend (TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -rn "TODO\|FIXME\|HACK\|XXX" frontend/src --include="*.ts" --include="*.tsx" | head -30 >> $GITHUB_STEP_SUMMARY || echo "None found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
