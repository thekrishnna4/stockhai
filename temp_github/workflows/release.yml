name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Build release
        run: cargo build --release
        working-directory: backend
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stockmart-backend-linux
          path: backend/target/release/stockmart

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      - name: Archive frontend
        run: tar -czvf stockmart-frontend.tar.gz -C frontend/dist .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stockmart-frontend
          path: stockmart-frontend.tar.gz

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: stockmart-backend-linux
          path: ./release
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: stockmart-frontend
          path: ./release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./release/stockmart
            ./release/stockmart-frontend.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
